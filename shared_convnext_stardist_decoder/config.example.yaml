# Copy to config.yaml and edit paths.

experiment_name: convnext_stardist_mt_v1

data:
  train_images_dir: /path/to/tiles/train/images
  train_labels_dir: /path/to/tiles/train/labels   # same stem as image; uint16/uint32 TIFF, 0=bg
  val_images_dir: /path/to/tiles/val/images
  val_labels_dir: /path/to/tiles/val/labels

model:
  backbone: convnextv2_tiny.fcmae_ft_in22k_in1k_224
  pretrained: true
  n_rays: 32
  # If set, defines output order C matching CE targets 0..C-1 (recommended).
  class_names: [bladder, bone, brain, collagen, ear, eye, gi, heart, kidney, liver, lungs, mesokidney, nontissue, pancreas, skull, spleen, spleen2, thymus, thyroid]
  num_classes: 19   # must equal len(class_names) when class_names is set
  decoder_channels: 128

train:
  patch_size: 256
  batch_size: 4
  num_workers: 4
  epochs: 100
  lr: 1.0e-4
  weight_decay: 0.01
  amp: true
  freeze_backbone_epochs: 5
  loss_w_prob: 1.0
  loss_w_dist: 0.05
  loss_w_cls: 0.5
  log_every: 20

checkpoint:
  out_dir: ./runs/convnext_stardist_mt_v1
  save_every: 1

infer:
  prob_thresh: 0.45
  nms_dist: 3
  sample_offsets: [0, 128]   # multi-phase tiling; single [0] for no jitter
