# ──────────────────────────────────────────────────────────────────────────────
# Fine-tuning config for GS40+GS55 ConvNextV2-StarDist multitask model
# Resume from: best checkpoint of convnext_stardist_mt_gs40_gs55_v1 (epoch 14)
#
# ANALYSIS of training log (epochs 1-26):
#   • Epochs 1-10:  backbone frozen, lr=5e-5 — steady val improvement
#   • Epoch 14:     best checkpoint  val_loss=0.44122  ★
#   • Epochs 15-26: val loss increases (cls head overfitting / LR too high)
#
# FINE-TUNING STRATEGY:
#   1. Resume from best.pt (epoch 14) via --resume flag
#   2. stem_exclude_prefix for GS40 train (all slides except val slide 0326); stem_prefix for val
#   3. Backbone unfrozen from the start (already well-trained)
#   4. Very low LR (1e-5) for the whole model; backbone can continue adapting
#   5. CosineAnnealingLR T_max = epochs for smooth decay to lr_min
#   6. Slightly stronger cls weights to squeeze out remaining class errors
# ──────────────────────────────────────────────────────────────────────────────

experiment_name: convnext_stardist_mt_gs40_gs55_v2_finetune

data:
  train_sources:
  - images_dir: \\kittyserverdw\Andre_kit\data\students\Diogo\data\fetal\GS40\cellvit_training\dataset_256_40k_48_slides\train\images
    labels_dir: \\kittyserverdw\Andre_kit\data\students\Diogo\data\fetal\GS40\cellvit_training\dataset_256_40k_48_slides\stardist_multitask_ready\train_instance_labels
    stem_exclude_prefix: monkey_fetus_40_0326  # exclude val slide; keep all other slides
  - images_dir: \\kittyserverdw\Andre_kit\data\students\Diogo\data\fetal\GS55\cellvit_training\dataset_256_40k_GS55\train\images
    labels_dir: \\kittyserverdw\Andre_kit\data\students\Diogo\data\fetal\GS55\cellvit_training\dataset_256_40k_GS55\train\labels
  val_sources:
  - images_dir: \\kittyserverdw\Andre_kit\data\students\Diogo\data\fetal\GS40\cellvit_training\dataset_256_40k_48_slides\train\images
    labels_dir: \\kittyserverdw\Andre_kit\data\students\Diogo\data\fetal\GS40\cellvit_training\dataset_256_40k_48_slides\stardist_multitask_ready\train_instance_labels
    stem_prefix: monkey_fetus_40_0326  # held-out val slide; lives in same dir as train
  - images_dir: \\kittyserverdw\Andre_kit\data\students\Diogo\data\fetal\GS55\cellvit_training\dataset_256_40k_GS55\val\images
    labels_dir: \\kittyserverdw\Andre_kit\data\students\Diogo\data\fetal\GS55\cellvit_training\dataset_256_40k_GS55\val\labels
  cache_to_ram: false

model:
  backbone: facebook/convnextv2-tiny-22k-224
  pretrained: true
  n_rays: 32
  class_names:
  - bone
  - brain
  - eye
  - heart
  - lungs
  - gi
  - liver
  - spleen
  - pancreas
  - kidney
  - mesokidney
  - collagen
  - ear
  - nontissue
  - thymus
  - thyroid
  - bladder
  - skull
  - spleen2
  num_classes: 19
  decoder_channels: 128
  cls_semantic_dim: 128
  head_cls_layers: 2

train:
  patch_size: 256
  batch_size: 8
  num_workers: 8
  epochs: 15
  lr: 1.0e-05
  lr_min: 1.0e-07
  weight_decay: 0.03
  amp: true
  freeze_backbone_epochs: 5
  loss_w_prob: 2.0
  loss_w_dist: 0.15
  loss_w_cls: 1.0
  loss_w_inst: 0.25
  class_weights: auto
  cls_balanced_sampler: true
  cls_only: false

checkpoint:
  out_dir: \\kittyserverdw\Andre_kit\data\students\Diogo\data\fetal\GS40\cellvit_training\dataset_256_40k_48_slides\convnext_stardist_multitask_runs\run_gs40_gs55_finetune_e14
  save_every: 1

infer:
  prob_thresh: 0.45
  nms_dist: 3
